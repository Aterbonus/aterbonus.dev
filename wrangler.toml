name = "new-aterbonus-dev"
compatibility_date = "2026-07-20"
compatibility_flags = [ 'nodejs_compat' ]

[[d1_databases]]
binding = "DB"
database_name = "aterbonus-dev"
database_id = "7679200a-0ed3-42a3-9ed2-f959122f43c1"
migrations_dir = "server/db/migrations"
migrations_pattern = "server/db/migrations/*/migration.sql"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
